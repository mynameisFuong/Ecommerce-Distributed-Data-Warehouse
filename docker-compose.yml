services:
  citus-coordinator:
    image: citusdata/citus:12.1
    container_name: ecommerce-citus-coordinator
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_dw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_dw"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_dw_net

  citus-worker-1:
    image: citusdata/citus:12.1
    container_name: ecommerce-citus-worker-1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_dw
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_dw"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_dw_net

  citus-worker-2:
    image: citusdata/citus:12.1
    container_name: ecommerce-citus-worker-2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_dw
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_dw"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_dw_net

  citus-worker-3:
    image: citusdata/citus:12.1
    container_name: ecommerce-citus-worker-3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_dw
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_dw"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_dw_net

  citus-worker-4:
    image: citusdata/citus:12.1
    container_name: ecommerce-citus-worker-4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_dw
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_dw"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_dw_net


  airflow-postgres:
    image: postgres:15
    container_name: ecommerce-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_dw_net

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: ecommerce-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
      citus-coordinator:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas>=2.1.2,<2.2 psycopg2-binary>=2.9.9"
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./etl:/opt/airflow/project/etl
      - ./sql:/opt/airflow/project/sql
      - ./data:/opt/airflow/project/data
      - ./requirements.txt:/opt/airflow/project/requirements.txt
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    networks:
      - ecommerce_dw_net

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: ecommerce-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas>=2.1.2,<2.2 psycopg2-binary>=2.9.9"
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./etl:/opt/airflow/project/etl
      - ./sql:/opt/airflow/project/sql
      - ./data:/opt/airflow/project/data
      - ./requirements.txt:/opt/airflow/project/requirements.txt
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - ecommerce_dw_net

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: ecommerce-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      _PIP_ADDITIONAL_REQUIREMENTS: "pandas>=2.1.2,<2.2 psycopg2-binary>=2.9.9"
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./etl:/opt/airflow/project/etl
      - ./sql:/opt/airflow/project/sql
      - ./data:/opt/airflow/project/data
      - ./requirements.txt:/opt/airflow/project/requirements.txt
    command: scheduler
    networks:
      - ecommerce_dw_net

networks:
  ecommerce_dw_net:
    name: ecommerce_dw_net
